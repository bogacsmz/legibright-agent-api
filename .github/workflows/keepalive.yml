# Keeps the free-tier Railway deployment warm so a judge's agent never hits a
# cold/sleeping service. Pings /health every 5 minutes. Public repo => free
# Actions minutes. Scheduled runs can be delayed a few minutes under GitHub
# load; for sub-minute reliability also point an external uptime monitor
# (e.g. UptimeRobot / cron-job.org) at the same /health URL.
name: keep-alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /health
        run: |
          set -e
          URL="https://web-production-710f9.up.railway.app/health"
          code=$(curl -sS -o /tmp/body -w '%{http_code}' --max-time 30 --retry 3 --retry-delay 5 "$URL")
          echo "HTTP $code — $(cat /tmp/body)"
          test "$code" = "200"
